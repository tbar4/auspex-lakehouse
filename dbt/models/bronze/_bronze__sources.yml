    meta:
      external_location: "delta_scan('s3://auspex-lakehouse/bronze/{name}')"
    tables:
      - name: nasa_astronomy_picture_of_the_day
        description: "NASA Astronomy Picture of the Day — one record per calendar date (api.nasa.gov /planetary/apod)."
        meta: {dagster: {asset_key: ["dlt_nasa_astronomy_picture_of_the_day"]}}
      - name: nasa_near_earth_object_feed
        description: "Near-Earth Object Web Service daily feed — one row per asteroid per close-approach feed date (api.nasa.gov /neo/rest/v1/feed)."
        meta: {dagster: {asset_key: ["dlt_nasa_near_earth_object_feed"]}}
      - name: nasa_near_earth_object_lookups
        description: "Per-object NEO lookups enriched with orbital data; 'not_found' rows are 404 tombstones (api.nasa.gov /neo/rest/v1/neo/{id})."
        meta: {dagster: {asset_key: ["nasa_near_earth_object_lookups"]}}
      - name: nasa_donki_coronal_mass_ejections
        description: "DONKI Coronal Mass Ejection events (api.nasa.gov /DONKI/CME)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_coronal_mass_ejections"]}}
      - name: nasa_donki_coronal_mass_ejection_analyses
        description: "DONKI CME Analysis — kinematic measurements per CME (api.nasa.gov /DONKI/CMEAnalysis)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_coronal_mass_ejection_analyses"]}}
      - name: nasa_donki_geomagnetic_storms
        description: "DONKI Geomagnetic Storm events (api.nasa.gov /DONKI/GST)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_geomagnetic_storms"]}}
      - name: nasa_donki_interplanetary_shocks
        description: "DONKI Interplanetary Shock events (api.nasa.gov /DONKI/IPS)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_interplanetary_shocks"]}}
      - name: nasa_donki_solar_flares
        description: "DONKI Solar Flare events (api.nasa.gov /DONKI/FLR)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_solar_flares"]}}
      - name: nasa_donki_solar_energetic_particles
        description: "DONKI Solar Energetic Particle events (api.nasa.gov /DONKI/SEP)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_solar_energetic_particles"]}}
      - name: nasa_donki_magnetopause_crossings
        description: "DONKI Magnetopause Crossing events (api.nasa.gov /DONKI/MPC)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_magnetopause_crossings"]}}
      - name: nasa_donki_radiation_belt_enhancements
        description: "DONKI Radiation Belt Enhancement events (api.nasa.gov /DONKI/RBE)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_radiation_belt_enhancements"]}}
      - name: nasa_donki_high_speed_streams
        description: "DONKI High Speed Stream events (api.nasa.gov /DONKI/HSS)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_high_speed_streams"]}}
      - name: nasa_donki_wsa_enlil_simulations
        description: "DONKI WSA-Enlil heliospheric model simulations (api.nasa.gov /DONKI/WSAEnlilSimulations)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_wsa_enlil_simulations"]}}
      - name: nasa_donki_notifications
        description: "DONKI space-weather notifications/reports of all types (api.nasa.gov /DONKI/notifications)."
        meta: {dagster: {asset_key: ["dlt_nasa_donki_notifications"]}}
      - name: space_track_general_perturbations
        description: "space-track General Perturbations — latest orbital element set (OMM/TLE) per catalogued object (space-track.org class 'gp')."
        meta: {dagster: {asset_key: ["dlt_space_track_general_perturbations"]}}
      - name: space_track_satellite_catalog
        description: "space-track Satellite Catalog — current metadata for every catalogued object (space-track.org class 'satcat')."
        meta: {dagster: {asset_key: ["dlt_space_track_satellite_catalog"]}}
      - name: space_track_boxscore
        description: "space-track Boxscore — on-orbit and decayed object counts by country/organization (space-track.org class 'boxscore')."
        meta: {dagster: {asset_key: ["dlt_space_track_boxscore"]}}
      - name: space_track_decays
        description: "space-track Decay messages — predicted and observed re-entry/decay events (space-track.org class 'decay')."
        meta: {dagster: {asset_key: ["dlt_space_track_decays"]}}
      - name: space_track_conjunction_data_messages
        description: "space-track public Conjunction Data Messages — predicted close approaches between objects (space-track.org class 'cdm_public')."
        meta: {dagster: {asset_key: ["dlt_space_track_conjunction_data_messages"]}}
      - name: space_track_tracking_and_impact_predictions
        description: "space-track Tracking and Impact Prediction messages for decaying objects (space-track.org class 'tip')."
        meta: {dagster: {asset_key: ["dlt_space_track_tracking_and_impact_predictions"]}}
      - name: celestrak_space_weather
        description: "CelesTrak consolidated daily space weather — one row per date (F10.7 solar flux observed/adjusted + 81-day averages, 3-hourly & daily Ap/Kp, sunspot number; F10.7_DATA_TYPE flags OBS/INT/PRD/PRM). Drag-driver inputs for orbit propagation (celestrak.org/SpaceData/SW-All.csv)."
        meta: {dagster: {asset_key: ["dlt_celestrak_space_weather"]}}
