# Dagster instance config used inside the Docker deployment.
# Storage is backed by the Postgres service defined in docker-compose.yaml.
# Credentials are resolved from environment variables at container start.
storage:
  postgres:
    postgres_db:
      username:
        env: DAGSTER_POSTGRES_USER
      password:
        env: DAGSTER_POSTGRES_PASSWORD
      hostname:
        env: DAGSTER_POSTGRES_HOST
      db_name:
        env: DAGSTER_POSTGRES_DB
      port: 5432

# Serialize NASA API access so concurrent runs can't both burn the shared
# 1000-calls/hour budget (the budget is one bucket; parallel streams only
# mutually 429 and double-spend). Other providers get their own pools.
concurrency:
  pools:
    nasa_api:
      limit: 1
      granularity: 'op'
    spacetrack_api:        # separate provider, separate budget
      limit: 1
      granularity: 'op'
